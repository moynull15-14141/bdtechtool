[build]
  command = "npm run build"
  publish = "dist"

# Ensure admin panel loads correctly without SPA interference
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true

# Tell Netlify to stop evaluating and just serve the admin index.html for any admin paths
[[redirects]]
  from = "/admin/*"
  status = 200

# SPA fallback for all other routes (placed last, it won't catch /admin because of the rule above)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for main site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com blob:; connect-src 'self' https://identity.netlify.com https:;"

# Headers for admin panel - more permissive for Decap CMS
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self' https:; base-uri 'self'; object-src 'none'; form-action 'self' https://api.netlify.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://unpkg.com https://identity.netlify.com https://decap-cms.org; connect-src 'self' https://api.netlify.com https://identity.netlify.com https://decap-cms.org https:;"

# Cache assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
